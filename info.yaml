# Tiny Tapeout project information
project:
  title:        "Sigma-Delta Bitstream ADC (8-bit)"
  author:       "William Anthony"
  discord:      "wlmoi"
  description:  "Enable-controlled 1-bit sigma-delta decimator ADC with gain and offset trim"
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     13560000

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_william_adc8"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "adc_sigma_delta_top.v"
    - "adc_input_synchronizer.v"
    - "adc_control.v"
    - "adc_decimator.v"
    - "adc_gain_offset_cal.v"
    - "adc_activity_monitor.v"
    - "adc_output_registers.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "ADC enable"
  ui[1]: "1-bit sigma-delta bitstream input"
  ui[2]: "Reserved"
  ui[3]: "Reserved"
  ui[4]: "Offset trim bit 0 (signed)"
  ui[5]: "Offset trim bit 1 (signed)"
  ui[6]: "Offset trim bit 2 (signed)"
  ui[7]: "Offset trim bit 3 (signed)"

  # Outputs
  uo[0]: "ADC output bit 0"
  uo[1]: "ADC output bit 1"
  uo[2]: "ADC output bit 2"
  uo[3]: "ADC output bit 3"
  uo[4]: "ADC output bit 4"
  uo[5]: "ADC output bit 5"
  uo[6]: "ADC output bit 6"
  uo[7]: "ADC output bit 7"

  # Bidirectional pins
  uio[0]: "Gain trim bit 0 (input)"
  uio[1]: "Gain trim bit 1 (input)"
  uio[2]: "Gain trim bit 2 (input)"
  uio[3]: "Gain trim bit 3 (input)"
  uio[4]: "Valid pulse (output)"
  uio[5]: "Busy status (output)"
  uio[6]: "Activity status (output)"
  uio[7]: "Saturation status (output)"

# Do not change!
yaml_version: 6
